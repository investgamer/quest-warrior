    <title>The Most Complete PC Download Center</title>
    <style>
        :root {
            --bg-body: #000000;
            --bg-card: #111111;
            --accent: #006330;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;        
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 5px 15px; /**/
        }

        .main-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 98%;
            max-width: 1600px;
            padding-bottom: 80px;
        }

        .post-box {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 15px;            /**/
            display: flex;
            flex-direction: column;
            align-items: center;      
            justify-content: flex-start; /**/
            border: 2px solid #222;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            min-height: 350px;         /**/
        }

        .post-box:hover {
            transform: translateY(-5px);
            border-color: #323232; 
            box-shadow: 0 0 20px rgba(136, 136, 136, 0.2);
        }

        .post-title {
            font-size: 1.1rem;
            margin: 0 0 10px 0;      /**/
            min-height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-title a { color: var(--text-main); text-decoration: none; }

        .post-image {
            width: 100%;
            height: auto;
            max-height: 340px;        /**/
            object-fit: contain; 
            border-radius: 8px;
            margin-bottom: 2px;      /**/
        }

        .post-description {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin: 0 0 15px 0;       /**/
            min-height: 35px;
            display: flex;
            align-items: center;
        }

        .btn-download {
            background-color: var(--accent);
            color: white;
            padding: 10px 0;
            width: 100%;
            max-width: 180px; 
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: auto;         /**/
            transition: 0.3s;
        }
        .btn-download:hover { background-color: #7a7a80; }

        @media (max-width: 1200px) { 
            .main-container { grid-template-columns: repeat(2, 1fr); } 
            .post-box { min-height: auto; }
        }
        @media (max-width: 600px) { 
            .main-container { grid-template-columns: 1fr; } 
        }
    </style>
</head>
